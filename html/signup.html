<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure registration for approved PMA Club Portal users.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/PMA_Score_8.png">
  <link rel="stylesheet" href="css/signup.css" />
  <title>Club Portal | Sign Up</title>
</head>
<body>
  <div class="center-wrapper">
    <h1><center>register</center></h1>
    <p>official registration for pre-approved PMA club users:</p>

    <form id="registerForm" class="signup-form" action="/signup" method="post">
      <div class="control block-cube">
        <label class="input-label" for="signup-client">assigned client name</label>
        <input id="signup-client" type="text" name="client" placeholder="assigned client name" required autocomplete="organization" />
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
      </div>

      <div class="control block-cube">
        <label class="input-label" for="signup-username">username or email</label>
        <input id="signup-username" type="text" name="username" placeholder="enter username/email" required autocomplete="username" />
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
      </div>

      <div class="control block-cube">
        <label class="input-label" for="signup-password">password (minimum 8 characters)</label>
        <input id="signup-password" type="password" name="password" placeholder="choose password" required minlength="8" autocomplete="new-password" />
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
      </div>

      <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
        <div class="text">register</div>
      </button>
    </form>

    <form id="backToLoginForm" class="signup-form" action="/" method="get">
      <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
        <div class="text">back to log-in</div>
      </button>
    </form>

    <div class="trust-footer" aria-label="Legal and security information">
      <p>Registration is limited to pre-approved client accounts. 
        If you were not invited to register, return to login and contact your PMA administrator. 
        By registering, you agree to the <a href="/terms">Terms</a> 
        and <a href="/privacy">Privacy Policy</a>.</p>
    </div>
  </div>

  <script src="/js/signup.js" defer></script>
</body>
</html>
