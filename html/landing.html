<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/images/PMA_Score_8.png">
  <title>client view</title>
  <link rel="stylesheet" href="css/landing.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* Ensure pricing tables fit on mobile regardless of embedded content language */
    #pricingOverlay table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    #pricingOverlay th, #pricingOverlay td { padding: 8px 10px; word-break: break-word; overflow-wrap: anywhere; }
    #pricingOverlay h1 { font-size: 24px; }
    #pricingOverlay #pricingDescription { font-size: 14px; }
    @media (max-width: 768px) {
      #pricingOverlay th, #pricingOverlay td { padding: 6px 8px; }
      .lang-select-row { margin-top: 20px !important; }
    }
    @media (max-width: 480px) {
      #pricingOverlay th, #pricingOverlay td { padding: 4px 6px; font-size: 12px; }
      #pricingOverlay h1 { font-size: 18px; }
      #pricingOverlay #pricingDescription { font-size: 12px; }
      .lang-select-row { margin-top: 20px !important; }
    }
  </style>
</head>

<body>
  <div class="header-image-container">
    <img src="/images/PMA_Score_8.png" alt="render_error" class="header-image">
  </div>

  <div id="clientHeader" style="display:flex; justify-content:center; align-items:center; gap:10px; margin-top:24px;">
    <button id="openPricingPaymentsBtn" class="action-btn ellipsis-btn"><span class="ellipsis-text">&nbsp;&nbsp;&nbsp;</span></button>
    <div id="profileLabel" style="text-align:center; color:#fff; font-size:28px; font-weight:bold; display:none; text-shadow: 0 0 10px #00d4ff55, 0 0 20px #00d4ff55;">
      Client: <span id="profileClientName" style="color:#00d4ff; text-shadow: 0 0 10px #00d4ff88, 0 0 20px #00d4ff55;"></span>
    </div>
  </div>

  <div id="release-notes-section" style="text-align:center; margin-top:16px;">
    <button id="openReleaseNotesBtn" class="action-btn" style="margin-right:16px; display:none;">release notes/user guide</button>
  </div>

  <!-- <h2 class="heading">please select a scoring system to continue:</h2> -->
  <div class="scoring-system-text">select a scoring system:</div>
  <div class="scoring-table-container">
    <table id="grid"></table>
  </div>

  <div id="qrOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:9999;">
    <div id="qrContainer" style="background:#fff; padding:20px; border-radius:8px; position:relative;">
      <button id="closeQrOverlayBtn" style="position:absolute; top:10px; right:10px;">✕</button>
      <!-- <div id="qrCode"></div> -->
      <div id="qrCode" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>
  </div>

  <div id="releaseNotesOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:10000;">
    <div style="background:rgba(33,33,33,0.95); padding:32px 40px; border-radius:16px; min-width:320px; max-width:90vw; max-height:80vh; overflow-y:auto; position:relative; box-shadow:0 0 40px #00d4ff55; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <button id="closeReleaseNotesOverlayBtn" style="position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">✕</button>
      <h2 class="heading" style="color:#fff;">release notes</h2>
      <ul id="releaseNotesList" style="list-style:disc; padding:0; text-align:center; margin:0 auto; display:inline-block;"></ul>
    </div>
  </div>

  <div id="pricingOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:10000;">
    <div style="background:rgba(33,33,33,0.95); padding:32px 40px; border-radius:16px; width:95vw; max-width:1000px; max-height:80vh; overflow-y:auto; position:relative; box-shadow:0 0 40px #00d4ff55;">
      <button id="closePricingOverlayBtn" style="position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">✕</button>
      <div class="lang-select-row">
        <label for="pricingLanguageSelect">Language:</label>
        <select id="pricingLanguageSelect" aria-label="Select pricing language">
          <option value="en">English</option>
          <option value="es">Espanol</option>
          <option value="fr">Francais</option>
          <option value="it">Italiano</option>
          <option value="ja">日本語</option>
          <option value="pl">Polski</option>
          <option value="nl">Nederlands</option>
          <option value="ms">Bahasa Melayu</option>
          <option value="ru">Русский</option>
        </select>
      </div>
      <div id="pricingEnglish" style="margin-top:32px; color:#fff; font-size:18px;"></div>
      <div id="pricingSpanish" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingFrench" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingItalian" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingJapanese" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingPolish" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingDutch" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingMalay" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
      <div id="pricingRussian" style="margin-top:32px; color:#fff; font-size:18px; display:none;"></div>
    </div>
  </div>

  <form id="logoutForm" action="/logout" method="get" class="logout-form">
    <button class="btn block-cube block-cube-hover" type="submit">
      <div class="bg-top"><div class="bg-inner"></div></div>
      <div class="bg-right"><div class="bg-inner"></div></div>
      <div class="bg"><div class="bg-inner"></div></div>
      <div class="text">logout</div>
    </button>
  </form>


  <script>
    // Logging helper: sends interaction data to the server
    function logInteraction(action, details) {
      const payload = { interaction: Object.assign({ action: action, page: 'landing' }, details || {}) };
      fetch('/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    // Log landing page view
    logInteraction('page_view', { description: 'Landing page loaded' });

    // Populate Profile label
    fetch('/api/profile')
      .then(res => {
        if (!res.ok) throw new Error('Server error');
        return res.json();
      })
      .then(profile => {
        if (profile && profile.clientName) {
          document.getElementById('profileClientName').textContent = profile.clientName;
          document.getElementById('profileLabel').style.display = 'block';
        }
      })
      .catch(() => {
        alert('Unable to load your profile. The database may be temporarily unavailable — please try refreshing the page.');
      });

    fetch('/api/grid-data')
      .then(res => {
        if (!res.ok) throw new Error('Server error');
        return res.json();
      })
      .then(data => {
        const table = document.getElementById('grid');
        if (!data || data.error || data.length === 0) {
          table.innerHTML = '<tr><td>No data</td></tr>';
          return;
        }

        // Only show columns whose name starts with "DISPLAY_"
        const displayPrefix = 'DISPLAY_';
        const headers = Object.keys(data[0]).filter(h => h.startsWith(displayPrefix));
        const headerRow = document.createElement('tr');
        headers.forEach(h => {
          const th = document.createElement('th');
          th.textContent = h.substring(displayPrefix.length);
          headerRow.appendChild(th);
        });
        table.appendChild(headerRow);

        data.forEach(row => {
          const tr = document.createElement('tr');
          const appName = row['App Instance Name'] || 'unknown';
          const appId = row['app_instance_id'] || null;

          headers.forEach(h => {
            const td = document.createElement('td');
            const label = h.substring(displayPrefix.length);

            if (label === 'App Instance Name') {
              if (row[h]) {
                const a = document.createElement('a');
                a.href = row[h];
                a.textContent = appName !== 'unknown' ? appName : 'app link';
                a.target = '_blank';
                a.addEventListener('click', function() {
                  logInteraction('app_click', { app_instance_id: appId, app_name: appName });
                });
                td.appendChild(a);
              } else {
                td.textContent = appName;
              }
            } else if (label === 'Extra Links') {
              const linkField = row[h];
              if (linkField) {
                const links = linkField.split(',').map(l => l.trim()).filter(l => l);
                if (links.length > 0) {
                  const btn = document.createElement('button');
                  btn.textContent = 'Show QRs';
                  btn.onclick = () => {
                    logInteraction('show_qr_codes', { app_instance_id: appId, app_name: appName, link_count: links.length });
                    const qrCodeDiv = document.getElementById('qrCode');
                    qrCodeDiv.innerHTML = ''; // Clear previous

                    links.forEach((link, idx) => {
                      const container = document.createElement('div');
                      container.style.display = 'flex';
                      container.style.flexDirection = 'column';
                      container.style.alignItems = 'center';
                      container.style.margin = '30px';

                      const label = document.createElement('div');
                      label.textContent = `Umpire ${idx + 1}`;
                      label.style.marginBottom = '10px';
                      label.style.fontWeight = 'bold';
                      label.style.color = 'black';
                      label.style.fontSize = '30px';

                      const qrDiv = document.createElement('div');
                      new QRCode(qrDiv, {
                        text: link,
                        width: 225,
                        height: 225,
                        correctLevel: QRCode.CorrectLevel.L
                      });

                      container.appendChild(label);
                      container.appendChild(qrDiv);
                      qrCodeDiv.appendChild(container);
                    });
                    document.getElementById('qrOverlay').style.display = 'flex';
                  };
                  td.appendChild(btn);
                }
              }
            }
            else if (label === 'Active') {
              td.textContent = row[h] === 1 || row[h] === '1' ? 'Yes' : 'No';
            }
            else {
              td.textContent = row[h];
            }

            tr.appendChild(td);
          });
          table.appendChild(tr);
        });
      })
      .catch(() => {
        alert('Unable to load scoring systems. The database may be temporarily unavailable — please try refreshing the page.');
        const table = document.getElementById('grid');
        table.innerHTML = '<tr><td>Unable to load data</td></tr>';
      });

    // Release Notes Popup Logic
    document.getElementById('openReleaseNotesBtn').onclick = function() {
      logInteraction('open_release_notes', { description: 'Opened release notes overlay' });
      fetch('/api/release-notes-list')
        .then(res => res.json())
        .then(files => {
          const list = document.getElementById('releaseNotesList');
          list.innerHTML = '';
          if (files.length === 0) {
            list.innerHTML = '<li style="color:#ccc;">No release notes available.</li>';
          } else {
            files.forEach(file => {
              const li = document.createElement('li');
              li.style.textAlign = 'center';
              li.style.margin = '0 auto 16px auto';
              li.style.listStyle = 'disc';
              const a = document.createElement('a');
              a.href = 'html/release_notes/' + file;
              a.textContent = file.replace('.html', '').replace(/_/g, ' ');
              a.target = '_blank';
              a.style.color = '#00d4ff';
              a.style.fontSize = '20px';
              a.style.display = 'inline-block';
              li.appendChild(a);
              list.appendChild(li);
            });
          }
          document.getElementById('releaseNotesOverlay').style.display = 'flex';
        })
        .catch(() => {
          const list = document.getElementById('releaseNotesList');
          list.innerHTML = '<li style="color:#ccc;">No release notes found.</li>';
          document.getElementById('releaseNotesOverlay').style.display = 'flex';
        });
    };

    // Pricing Popup Logic
    function loadPricingContent(lang) {
      const langMap = {
        'en': 'pricingEnglish',
        'es': 'pricingSpanish', 
        'fr': 'pricingFrench',
        'it': 'pricingItalian',
        'ja': 'pricingJapanese',
        'pl': 'pricingPolish',
        'nl': 'pricingDutch',
        'ms': 'pricingMalay',
        'ru': 'pricingRussian'
      };
      const targetDiv = document.getElementById(langMap[lang]);
      return fetch('html/pricing/pricing_' + lang + '.html')
        .then(res => res.text())
        .then(html => {
          // Extract only the <body> content
          const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
          targetDiv.innerHTML = bodyMatch ? bodyMatch[1] : html;
        });
    }

    function switchPricingLanguage(lang) {
      // Hide all pricing content divs
      const allDivs = ['pricingEnglish', 'pricingSpanish', 'pricingFrench', 'pricingItalian', 'pricingJapanese', 'pricingPolish', 'pricingDutch', 'pricingMalay', 'pricingRussian'];
      allDivs.forEach(divId => {
        document.getElementById(divId).style.display = 'none';
      });
      
      // Show selected localized container
      const langMap = {
        'en': 'pricingEnglish',
        'es': 'pricingSpanish',
        'fr': 'pricingFrench',
        'it': 'pricingItalian',
        'ja': 'pricingJapanese',
        'pl': 'pricingPolish',
        'nl': 'pricingDutch',
        'ms': 'pricingMalay',
        'ru': 'pricingRussian'
      };
      
      document.getElementById(langMap[lang]).style.display = '';
      return loadPricingContent(lang);
    }

    function openPricingOverlay() {
      logInteraction('open_pricing_payments', { description: 'Opened unified pricing/payments overlay' });
      document.getElementById('pricingOverlay').style.display = 'flex';
      document.getElementById('pricingLanguageSelect').value = 'en';
      switchPricingLanguage('en');
    }

    document.getElementById('openPricingPaymentsBtn').onclick = function() {
      openPricingOverlay();
    };

    function closeOverlay(overlayId, actionName) {
      const overlay = document.getElementById(overlayId);
      if (overlay) {
        overlay.style.display = 'none';
      }
      if (actionName) {
        logInteraction(actionName, { description: 'Closed modal overlay' });
      }
    }

    document.getElementById('closeQrOverlayBtn').onclick = function() {
      closeOverlay('qrOverlay', 'close_qr_overlay');
    };
    document.getElementById('closeReleaseNotesOverlayBtn').onclick = function() {
      closeOverlay('releaseNotesOverlay', 'close_release_notes_overlay');
    };
    document.getElementById('closePricingOverlayBtn').onclick = function() {
      closeOverlay('pricingOverlay', 'close_pricing_overlay');
    };

    document.getElementById('pricingLanguageSelect').addEventListener('change', function(evt) {
      const lang = evt.target.value;
      logInteraction('pricing_payments_language', { language: lang });
      switchPricingLanguage(lang);
    });

    // Allow clicking the backdrop itself to close each modal.
    ['qrOverlay', 'releaseNotesOverlay', 'pricingOverlay'].forEach(function(overlayId) {
      const overlay = document.getElementById(overlayId);
      if (!overlay) return;
      overlay.addEventListener('click', function(evt) {
        if (evt.target === overlay) {
          overlay.style.display = 'none';
        }
      });
    });

    // Close any open overlay with Escape.
    document.addEventListener('keydown', function(evt) {
      if (evt.key !== 'Escape') return;
      ['qrOverlay', 'releaseNotesOverlay', 'pricingOverlay'].forEach(function(overlayId) {
        const overlay = document.getElementById(overlayId);
        if (overlay && overlay.style.display !== 'none') {
          overlay.style.display = 'none';
        }
      });
    });

    // Log logout button click (server also logs it, but this captures the client-side intent)
    document.getElementById('logoutForm').addEventListener('submit', function() {
      logInteraction('logout', { description: 'User clicked logout' });
    });
  </script>

</body>
</html>
